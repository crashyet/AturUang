<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>web_view</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">


    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #6cd0d0;
        overflow: hidden;
      }
      .app-container {
        width: 100%;
        max-width: 100%;
        height: 100vh;
        position: relative;
        overflow: hidden;
        background-color: #fff;
      }
      #root {
        height: 100%;
        width: 100%;
      }
      @media screen and (min-width: 1024px) {
        .app-container {
          max-width: 450px;
          height: 85vh;
          max-height: 900px;
          border-radius: 24px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div id="root"></div>
      <script type="module" src="/src/main.jsx"></script>
    </div>
  </body>
</html>
